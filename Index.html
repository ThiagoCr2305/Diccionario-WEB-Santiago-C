<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Diccionario de Servicios Web</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <div class="contenedor">

        <h1 class="titulo">Diccionario RA1</h1>

        <div class="buscador">
            <input type="text" id="busqueda" placeholder="Escribe REST, SOAP, HTTP...">
            <button onclick="buscar()">Buscar</button>
        </div>

        <div class="sugerencias">
            <h3>Palabras sugeridas:</h3>
            <span onclick="sugerir('rest')">REST</span>
            <span onclick="sugerir('soap')">SOAP</span>
            <span onclick="sugerir('http')">HTTP</span>
            <span onclick="sugerir('json')">JSON</span>
            <span onclick="sugerir('xml')">XML</span>
        </div>

        <div id="resultado" class="resultado"></div>

    </div>

<script>

const definiciones = {
    rest: {
        origen: "Del inglés Representational State Transfer.",
        significado: "Estilo de arquitectura para servicios web que utiliza HTTP para realizar operaciones como GET, POST, PUT y DELETE.",
        sinonimos: "API REST, servicio web RESTful."
    },
    soap: {
        origen: "Sigla de Simple Object Access Protocol.",
        significado: "Protocolo que permite el intercambio de información estructurada utilizando XML.",
        sinonimos: "Protocolo SOAP."
    },
    http: {
        origen: "Sigla de HyperText Transfer Protocol.",
        significado: "Protocolo que permite la comunicación entre clientes y servidores en la web.",
        sinonimos: "Protocolo web."
    },
    xml: {
        origen: "Sigla de eXtensible Markup Language.",
        significado: "Lenguaje de marcado que se utiliza para almacenar y transportar datos de manera estructurada.",
        sinonimos: "Lenguaje XML."
    },
    json: {
        origen: "Sigla de JavaScript Object Notation.",
        significado: "Formato ligero de intercambio de datos fácil de leer y escribir.",
        sinonimos: "Formato JSON."
    }
};

function buscar() {
    let palabra = document.getElementById("busqueda").value.trim().toLowerCase();
    let resultado = document.getElementById("resultado");

    if (definiciones[palabra]) {
        resultado.innerHTML = `
            <h2>${palabra.toUpperCase()}</h2>
            <p><strong>Origen:</strong> ${definiciones[palabra].origen}</p>
            <p><strong>Significado:</strong> ${definiciones[palabra].significado}</p>
            <p><strong>Sinónimos:</strong> ${definiciones[palabra].sinonimos}</p>
        `;
    } else {
        resultado.innerHTML = "<p class='error'>Palabra no encontrada en el diccionario.</p>";
    }
}

function sugerir(palabra) {
    document.getElementById("busqueda").value = palabra;
    buscar();
}

</script>

</body>
</html>
