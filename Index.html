<script>

const definiciones = {
    rest: {
        origen: "Del inglés Representational State Transfer.",
        significado: "Estilo de arquitectura para servicios web que utiliza HTTP para operaciones como GET, POST, PUT y DELETE.",
        sinonimos: "API REST, servicio web RESTful."
    },
    soap: {
        origen: "Sigla de Simple Object Access Protocol.",
        significado: "Protocolo que permite el intercambio de información estructurada utilizando XML.",
        sinonimos: "Protocolo SOAP."
    },
    http: {
        origen: "Sigla de HyperText Transfer Protocol.",
        significado: "Protocolo que permite la comunicación entre clientes y servidores en la web.",
        sinonimos: "Protocolo web."
    },
    xml: {
        origen: "Sigla de eXtensible Markup Language.",
        significado: "Lenguaje de marcado utilizado para almacenar y transportar datos estructurados.",
        sinonimos: "Lenguaje XML."
    },
    json: {
        origen: "Sigla de JavaScript Object Notation.",
        significado: "Formato ligero de intercambio de datos fácil de leer y escribir.",
        sinonimos: "Formato JSON."
    }
};

const input = document.getElementById("busqueda");
const resultado = document.getElementById("resultado");

// Buscar con botón o Enter
input.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        buscar();
    }
});

function buscar() {
    let palabra = input.value.trim().toLowerCase();

    if (!palabra) {
        resultado.innerHTML = "<p class='error'>Escribe una palabra.</p>";
        return;
    }

    if (definiciones[palabra]) {
        mostrarResultado(palabra);
    } else {
        buscarParcial(palabra);
    }
}

function buscarParcial(texto) {
    let coincidencias = Object.keys(definiciones)
        .filter(p => p.includes(texto));

    if (coincidencias.length > 0) {
        resultado.innerHTML = `
            <p>No se encontró exacto. ¿Quisiste decir?</p>
            ${coincidencias.map(p => 
                `<button onclick="mostrarResultado('${p}')">${p.toUpperCase()}</button>`
            ).join(" ")}
        `;
    } else {
        resultado.innerHTML = "<p class='error'>Palabra no encontrada.</p>";
    }
}

function mostrarResultado(palabra) {
    const data = definiciones[palabra];

    resultado.innerHTML = `
        <h2 class="palabra">${palabra.toUpperCase()}</h2>
        <p><strong>Origen:</strong> ${data.origen}</p>
        <p><strong>Significado:</strong> ${data.significado}</p>
        <p><strong>Sinónimos:</strong> ${data.sinonimos}</p>
    `;
}

function sugerir(palabra) {
    input.value = palabra;
    buscar();
}

function limpiar() {
    input.value = "";
    resultado.innerHTML = "";
}

</script>
